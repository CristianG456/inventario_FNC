version: '3.8'

services:
  app:
    build: .
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - bootstrap_cache_data:/var/www/bootstrap/cache
      - framework_cache_data:/var/www/storage/framework/cache/data
      - framework_views_data:/var/www/storage/framework/views
      - actas_firmadas_data:/var/www/storage/app/actas_firmadas
    networks:
      - laravel

  webserver:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "3300:80"
    volumes:
      - .:/var/www
      - actas_firmadas_data:/var/www/storage/app/actas_firmadas
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - laravel

  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_DATABASE: inventario
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel

networks:
  laravel:

volumes:
  vendor_data:
  bootstrap_cache_data:
  framework_cache_data:
  framework_views_data:
  actas_firmadas_data:
  mysql_data:
    # Preparación para futuros Backups Cloudflare R2:
    # Este volumen asegura la retención local, y el servicio de backup
    # podrá montarlo para leer y subir el .sql a R2.